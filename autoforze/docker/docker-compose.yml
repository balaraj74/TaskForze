services:
  # ─────────────────────────────────────────────
  # AutoForze Agent (one-shot query)
  #   docker compose -f docker/docker-compose.yml run --rm autoforze-agent -m "Hello"
  # ─────────────────────────────────────────────
  autoforze-agent:
    image: docker.io/sipeed/autoforze:latest
    container_name: autoforze-agent
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.autoforze
    entrypoint: ["autoforze", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # AutoForze Gateway (Long-running Bot)
  #   docker compose -f docker/docker-compose.yml --profile gateway up
  # ─────────────────────────────────────────────
  autoforze-gateway:
    image: docker.io/sipeed/autoforze:latest
    container_name: autoforze-gateway
    restart: unless-stopped
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.autoforze

  # ─────────────────────────────────────────────
  # AutoForze Launcher (Web Console + Gateway)
  #   docker compose -f docker/docker-compose.yml --profile launcher up
  # ─────────────────────────────────────────────
  autoforze-launcher:
    image: docker.io/sipeed/autoforze:launcher
    container_name: autoforze-launcher
    restart: unless-stopped
    profiles:
      - launcher
    environment:
      - AUTOFORZE_GATEWAY_HOST=0.0.0.0
      # Set a fixed dashboard token instead of a random one each restart.
      # If not set, a random token is generated and printed to the console on startup.
      #- AUTOFORZE_LAUNCHER_TOKEN=your-secret-token-here
    ports:
      - "18800:18800"
      - "18790:18790"
    volumes:
      - ./data:/root/.autoforze
