services:
  # ─────────────────────────────────────────────
  # AutoForze Agent (one-shot query) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml run --rm autoforze-agent -m "Hello"
  # ─────────────────────────────────────────────
  autoforze-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: autoforze-agent-full
    profiles:
      - agent
    volumes:
      - ../config/config.json:/root/.autoforze/config.json:ro
      - autoforze-workspace:/root/.autoforze/workspace
      - autoforze-npm-cache:/root/.npm # npm cache for faster MCP server installs
    entrypoint: ["autoforze", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # AutoForze Gateway (Long-running Bot) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml --profile gateway up
  # ─────────────────────────────────────────────
  autoforze-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: autoforze-gateway-full
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ../config/config.json:/root/.autoforze/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - autoforze-workspace:/root/.autoforze/workspace
      # NPM cache for faster MCP server installs
      - autoforze-npm-cache:/root/.npm
    command: ["gateway"]

volumes:
  autoforze-workspace:
  autoforze-npm-cache: # Cache npm packages to speed up MCP server installations
